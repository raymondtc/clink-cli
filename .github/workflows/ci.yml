name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true
    
    - name: Verify Go modules
      run: |
        go mod verify
        go mod download
    
    - name: Run tests
      run: go test -v -race ./...
    
    - name: Build test
      run: |
        go build -v ./cmd/clink
        go build -v ./cmd/clink-mcp
    
    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Please run gofmt -s -w ."
          gofmt -s -l .
          exit 1
        fi

  release:
    needs: [test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
    
    - name: Download dependencies
      run: go mod download
    
    - name: Build binaries
      env:
        GOOS: ${{ matrix.os }}
        GOARCH: ${{ matrix.arch }}
        CGO_ENABLED: 0
      run: |
        mkdir -p dist
        ext=""
        if [ "${{ matrix.os }}" = "windows" ]; then
          ext=".exe"
        fi
        go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
          -o dist/clink-${{ matrix.os }}-${{ matrix.arch }}${ext} \
          ./cmd/clink
        go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
          -o dist/clink-mcp-${{ matrix.os }}-${{ matrix.arch }}${ext} \
          ./cmd/clink-mcp
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.os }}-${{ matrix.arch }}
        path: dist/*
        retention-days: 1

  create-release:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: binaries-*
        merge-multiple: true
    
    - name: List artifacts
      run: ls -la dist/
    
    - name: Create checksums
      run: |
        cd dist
        sha256sum clink-* clink-mcp-* > checksums.txt || true
        cat checksums.txt
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
