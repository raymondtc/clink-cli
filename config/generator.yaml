# Clink CLI 生成器配置
# 用于控制哪些接口生成、如何映射参数到 flag

# 版本
version: "1.0"

# 全局配置
global:
  outputFormat: table
  defaultPageSize: 10
  timeFormat: "2006-01-02"

# 需要生成的接口配置
endpoints:
  # ==================== 通话记录 ====================
  listCdrIbs:
    command: ["records", "inbound"]
    description: "查询呼入通话记录"
    resultType: "list"
    custom:
      timeRange: true
      pagination: true
    flags:
      - param: startTime
        flag: start
        shorthand: s
        type: string
        description: "开始时间 (YYYY-MM-DD)"
        defaultFunc: "time.Now().AddDate(0,0,-7).Format(\"2006-01-02\")"
      - param: endTime
        flag: end
        shorthand: e
        type: string
        description: "结束时间 (YYYY-MM-DD)"
        defaultFunc: "time.Now().Format(\"2006-01-02\")"
      - param: customerNumber
        flag: phone
        shorthand: p
        type: string
        description: "客户号码筛选"
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号筛选"
      - param: offset
        flag: offset
        type: int
        description: "偏移量"
        default: "0"
      - param: limit
        flag: limit
        type: int
        description: "查询条数 (10-100)"
        default: "10"

  listCdrObs:
    command: ["records", "outbound"]
    description: "查询外呼通话记录"
    resultType: "list"
    custom:
      timeRange: true
      pagination: true
    flags:
      - param: startTime
        flag: start
        shorthand: s
        type: string
        description: "开始时间"
        defaultFunc: "time.Now().AddDate(0,0,-7).Format(\"2006-01-02\")"
      - param: endTime
        flag: end
        shorthand: e
        type: string
        description: "结束时间"
        defaultFunc: "time.Now().Format(\"2006-01-02\")"
      - param: customerNumber
        flag: phone
        shorthand: p
        type: string
        description: "客户号码筛选"
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号筛选"
      - param: offset
        flag: offset
        type: int
        default: "0"
      - param: limit
        flag: limit
        type: int
        default: "10"

  # ==================== 座席状态 ====================
  listAgentStatus:
    command: ["agents"]
    description: "查询座席状态列表"
    resultType: "custom"
    customTemplate: "agentsRender"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号 (可选，不传则查询所有)"

  # ==================== 呼叫控制 ====================
  webcall:
    command: ["call"]
    description: "发起 WebCall 外呼"
    use: "call <phone>"
    resultType: "kv"
    custom:
      conditional: true
      conditionField: "agent"
      conditionAPI: "MakeCall"
    args:
      - name: phone
        description: "客户电话号码"
        required: true
    flags:
      - param: customerNumber
        flag: ""
        source: arg
      - param: clid
        flag: clid
        type: string
        description: "外显号码"
      - param: ivrName
        flag: ivr
        type: string
        description: "IVR流程名称"
        default: "工作时间"
      - param: requestUniqueId
        flag: request-id
        type: string
        description: "请求唯一ID (防重放)"
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号 (指定后使用座席外呼)"

  # ==================== 座席管理 ====================
  online:
    command: ["agent", "online"]
    description: "座席登录上线"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true
      - param: qno
        flag: queue
        shorthand: q
        type: string
        description: "登录队列号"
      - param: bindTel
        flag: tel
        type: string
        description: "绑定电话号码"
      - param: bindType
        flag: bind-type
        type: int
        description: "绑定类型 (1-分机, 2-直线, 3-软电话)"
        default: "1"

  offline:
    command: ["agent", "offline"]
    description: "座席登出下线"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true

  pause:
    command: ["agent", "pause"]
    description: "座席置忙"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true
      - param: pauseType
        flag: type
        shorthand: t
        type: int
        description: "忙碌类型"
        default: "1"
      - param: description
        flag: reason
        shorthand: r
        type: string
        description: "忙碌原因"

  unpause:
    command: ["agent", "ready"]
    description: "座席置闲"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true

  # ==================== 队列管理 ====================
  getQueueStatus:
    command: ["queue", "status"]
    description: "查询队列状态"
    resultType: "custom"
    customTemplate: "queueRender"
    flags:
      - param: qnos
        flag: queue
        shorthand: q
        type: string
        description: "队列号"

  listQueues:
    command: ["queue", "list"]
    description: "查询队列列表"
    resultType: "list"
    flags:
      - param: offset
        flag: offset
        type: int
        description: "偏移量"
        default: "0"
      - param: limit
        flag: limit
        type: int
        description: "查询条数"
        default: "10"

  # ==================== 呼叫控制 (通话中) ====================
  unlink:
    command: ["call", "hangup"]
    description: "挂断当前通话"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true

  hold:
    command: ["call", "hold"]
    description: "保持当前通话"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true

  unhold:
    command: ["call", "unhold"]
    description: "恢复保持的通话"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true

  transfer:
    command: ["call", "transfer"]
    description: "转接电话"
    resultType: "simple"
    flags:
      - param: cno
        flag: agent
        shorthand: a
        type: string
        description: "座席号"
        required: true
      - param: transferType
        flag: type
        shorthand: t
        type: int
        description: "转接类型 (1-座席, 2-队列, 3-外线)"
        required: true
      - param: transferObject
        flag: target
        type: string
        description: "转接目标"
        required: true
